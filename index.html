<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DROPMAIL — Временная почта</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24; --border: #2a2a3a;
    --accent: #00ff88; --accent2: #ff3cac; --text: #e8e8f0;
    --mono: 'Space Mono', monospace; --sans: 'Syne', sans-serif;
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .app { position: fixed; inset: 0; display: flex; flex-direction: column; z-index: 1; }

  /* Header */
  .header { flex-shrink: 0; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--bg); }
  .logo { font-family: var(--sans); font-weight: 800; font-size: 1.2rem; letter-spacing: -0.02em; }
  .logo span { color: var(--accent); }
  .badge { font-family: var(--mono); font-size: 0.65rem; background: rgba(0,255,136,0.1); color: var(--accent); border: 1px solid rgba(0,255,136,0.3); padding: 3px 8px; border-radius: 2px; letter-spacing: 0.1em; }

  /* Email strip */
  .email-strip { flex-shrink: 0; padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); position: relative; }
  .email-strip::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .email-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .email-label { font-family: var(--mono); font-size: 0.62rem; color: #606080; text-transform: uppercase; letter-spacing: 0.15em; flex-shrink: 0; }
  .email-address { font-family: var(--mono); font-size: clamp(0.78rem, 2.5vw, 1rem); font-weight: 700; color: var(--accent); flex: 1; min-width: 160px; padding: 8px 12px; background: rgba(0,255,136,0.05); border: 1px solid rgba(0,255,136,0.2); border-radius: 3px; cursor: pointer; transition: all 0.2s; position: relative; word-break: break-all; user-select: all; }
  .email-address:hover { background: rgba(0,255,136,0.1); border-color: rgba(0,255,136,0.4); }
  .email-address.copied::after { content: '✓ СКОПИРОВАНО'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; background: var(--accent); color: #000; border-radius: 3px; font-weight: 700; letter-spacing: 0.1em; }
  .btn { font-family: var(--mono); font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; border: none; border-radius: 3px; cursor: pointer; padding: 8px 14px; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #00e67a; }
  .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: #4a4a6a; background: var(--surface2); }
  .btn-danger { background: transparent; color: #ff6b6b; border: 1px solid rgba(255,107,107,0.3); }
  .btn-danger:hover { background: rgba(255,107,107,0.1); }
  .status-bar { display: flex; align-items: center; gap: 6px; margin-top: 8px; font-family: var(--mono); font-size: 0.65rem; color: #606080; }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: #404060; flex-shrink: 0; }
  .status-dot.active { background: var(--accent); box-shadow: 0 0 5px var(--accent); animation: pulse 2s infinite; }

  /* Content */
  .content { flex: 1; display: flex; overflow: hidden; min-height: 0; }

  /* Inbox panel */
  .inbox-panel { width: 100%; display: flex; flex-direction: column; border-right: 1px solid var(--border); transition: width 0.3s ease; overflow: hidden; min-width: 0; }
  .inbox-panel.split { width: 38%; min-width: 190px; }
  .inbox-hdr { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--bg); }
  .inbox-title { font-size: 0.82rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .count-badge { font-family: var(--mono); font-size: 0.65rem; background: var(--accent2); color: #fff; padding: 1px 7px; border-radius: 20px; display: none; }
  .count-badge.show { display: inline-block; }
  .last-check { font-family: var(--mono); font-size: 0.6rem; color: #404060; }
  .inbox-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
  .inbox-scroll::-webkit-scrollbar { width: 4px; }
  .inbox-scroll::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }
  .inbox-empty { text-align: center; padding: 40px 16px; color: #606080; font-family: var(--mono); font-size: 0.72rem; line-height: 2; }
  .inbox-empty .icon { font-size: 2.2rem; display: block; margin-bottom: 10px; opacity: 0.3; }
  .loading-row { padding: 20px; text-align: center; font-family: var(--mono); font-size: 0.72rem; color: #606080; display: none; }
  .loading-row.show { display: block; }

  /* Message list items */
  .message-item { padding: 11px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; border-left: 3px solid transparent; }
  .message-item:hover { background: var(--surface2); }
  .message-item.active { background: var(--surface2); border-left-color: var(--accent); }
  .message-item.unread { border-left-color: var(--accent2); }
  .message-item.unread.active { border-left-color: var(--accent); }
  .msg-from { font-family: var(--mono); font-size: 0.68rem; color: var(--accent); margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .msg-subject { font-size: 0.8rem; font-weight: 700; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .msg-preview { font-family: var(--mono); font-size: 0.62rem; color: #505070; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .msg-time { font-family: var(--mono); font-size: 0.6rem; color: #404060; margin-top: 3px; }

  /* Message viewer */
  .msg-panel { flex: 1; display: none; flex-direction: column; overflow: hidden; min-width: 0; background: var(--bg); }
  .msg-panel.open { display: flex; }
  .msg-panel-hdr { flex-shrink: 0; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .msg-subject-text { font-weight: 800; font-size: 0.95rem; line-height: 1.3; margin-bottom: 4px; word-break: break-word; }
  .msg-meta { font-family: var(--mono); font-size: 0.65rem; color: #606080; line-height: 1.8; }
  .btn-back { font-family: var(--mono); font-size: 0.65rem; background: transparent; color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 2px; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.2s; display: none; }
  .btn-back:hover { border-color: #4a4a6a; }
  @media (max-width: 600px) {
    .inbox-panel.split { width: 0; min-width: 0; border: none; overflow: hidden; }
    .btn-back { display: inline-block; }
  }
  .msg-panel-body { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px; }
  .msg-panel-body::-webkit-scrollbar { width: 4px; }
  .msg-panel-body::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }

  /* Email content */
  .email-html-content { background: #fff; border-radius: 4px; padding: 16px; color: #111; font-family: Arial, sans-serif; font-size: 14px; line-height: 1.6; word-break: break-word; overflow-x: auto; }
  .email-html-content a { color: #1a73e8 !important; text-decoration: underline !important; cursor: pointer !important; pointer-events: auto !important; }
  .email-html-content img { max-width: 100%; height: auto; }
  .email-text-content { font-family: var(--mono); font-size: 0.78rem; line-height: 1.8; color: #c0c0d8; white-space: pre-wrap; word-break: break-word; }
  .email-text-content a { color: var(--accent); text-decoration: underline; cursor: pointer; }

  /* Toast */
  .toast-container { position: fixed; bottom: 16px; right: 16px; z-index: 200; display: flex; flex-direction: column; gap: 6px; }
  .toast { font-family: var(--mono); font-size: 0.7rem; padding: 10px 16px; border-radius: 3px; border-left: 3px solid var(--accent); background: var(--surface2); color: var(--text); animation: slideIn 0.3s ease; max-width: 280px; }
  .toast.error { border-left-color: #ff6b6b; }

  .spinner { display: inline-block; width: 11px; height: 11px; border: 2px solid rgba(0,255,136,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 5px; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes slideIn { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">DROP<span>MAIL</span></div>
    <span class="badge">TEMP EMAIL</span>
  </div>

  <div class="email-strip">
    <div class="email-row">
      <span class="email-label">адрес:</span>
      <div class="email-address" id="emailAddress" onclick="copyEmail()">
        <span class="spinner"></span> генерация...
      </div>
      <button class="btn btn-primary" onclick="copyEmail()">Копировать</button>
      <button class="btn btn-ghost" onclick="refreshMessages()">↺</button>
      <button class="btn btn-danger" onclick="generateNew()">Новый</button>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Инициализация...</span>
    </div>
  </div>

  <div class="content">
    <div class="inbox-panel" id="inboxPanel">
      <div class="inbox-hdr">
        <div class="inbox-title">
          Входящие
          <span class="count-badge" id="countBadge">0</span>
        </div>
        <span class="last-check" id="lastCheck"></span>
      </div>
      <div class="inbox-scroll">
        <div class="loading-row" id="loadingState"><span class="spinner"></span> загрузка...</div>
        <div class="inbox-empty" id="inboxEmpty">
          <span class="icon">📭</span>
          Писем нет.<br>Используй адрес выше<br>— письма появятся здесь.
        </div>
        <div id="messageList"></div>
      </div>
    </div>

    <div class="msg-panel" id="msgPanel">
      <div class="msg-panel-hdr">
        <div>
          <div class="msg-subject-text" id="msgSubject"></div>
          <div class="msg-meta" id="msgMeta"></div>
        </div>
        <button class="btn-back" onclick="closeMessage()">← Назад</button>
      </div>
      <div class="msg-panel-body" id="msgBody"></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const API = 'https://api.mail.tm';
let token = null, currentEmail = null, autoRefreshInterval = null, messages = [], activeId = null;

(async () => {
  try { await generateNew(); }
  catch(e) { setStatus(false,'Ошибка подключения'); showToast('Не удалось подключиться',true); }
})();

async function generateNew() {
  clearInterval(autoRefreshInterval);
  token = null; currentEmail = null; messages = []; activeId = null;
  document.getElementById('messageList').innerHTML = '';
  document.getElementById('inboxEmpty').style.display = 'block';
  document.getElementById('emailAddress').innerHTML = '<span class="spinner"></span> генерация...';
  setStatus(false,'Генерация адреса...');
  closeMessage();

  try {
    const dr = await fetch(`${API}/domains?page=1`);
    if(!dr.ok) throw new Error('domains');
    const dd = await dr.json();
    const domains = dd['hydra:member'] || dd.member || [];
    if(!domains.length) throw new Error('no domains');
    const domain = domains[0].domain;

    const rand = () => Math.random().toString(36).substring(2,10);
    const address = `${rand()}@${domain}`;
    const password = rand()+rand();

    const cr = await fetch(`${API}/accounts`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({address,password})});
    if(!cr.ok) throw new Error('create');

    const tr = await fetch(`${API}/token`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({address,password})});
    if(!tr.ok) throw new Error('token');
    const td = await tr.json();
    token = td.token;
    currentEmail = address;

    document.getElementById('emailAddress').textContent = currentEmail;
    setStatus(true,'Готово · обновление каждые 5 сек');
    showToast('Новый адрес создан!');

    await refreshMessages();
    autoRefreshInterval = setInterval(refreshMessages,5000);
  } catch(e) {
    document.getElementById('emailAddress').textContent = 'Ошибка генерации';
    setStatus(false,'Ошибка: '+e.message);
    showToast('Ошибка создания адреса',true);
  }
}

async function refreshMessages() {
  if(!token) return;
  document.getElementById('loadingState').classList.add('show');
  try {
    const res = await fetch(`${API}/messages`,{headers:{'Authorization':`Bearer ${token}`}});
    if(!res.ok) throw new Error('fetch');
    const data = await res.json();
    const msgs = data['hydra:member'] || data.member || [];
    const newCount = msgs.filter(m=>!messages.find(o=>o.id===m.id)).length;
    if(newCount>0 && messages.length>0) showToast(`📬 ${newCount} новое письмо!`);
    messages = msgs;
    renderMessages();
    const now = new Date();
    document.getElementById('lastCheck').textContent = now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  } catch(e){console.error(e);}
  document.getElementById('loadingState').classList.remove('show');
}

function renderMessages() {
  const list = document.getElementById('messageList');
  const empty = document.getElementById('inboxEmpty');
  const badge = document.getElementById('countBadge');
  if(!messages.length){list.innerHTML='';empty.style.display='block';badge.classList.remove('show');return;}
  empty.style.display='none';
  badge.textContent=messages.length;
  badge.classList.add('show');
  list.innerHTML = messages.map(msg=>{
    const from = msg.from?.address||msg.from||'неизвестно';
    const subj = msg.subject||'(без темы)';
    const intro = msg.intro||'';
    const time = formatTime(msg.createdAt);
    const unread = msg.seen===false?'unread':'';
    const active = msg.id===activeId?'active':'';
    return `<div class="message-item ${unread} ${active}" onclick="openMessage('${msg.id}')">
      <div class="msg-from">${esc(from)}</div>
      <div class="msg-subject">${esc(subj)}</div>
      <div class="msg-preview">${esc(intro)}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  }).join('');
}

async function openMessage(id) {
  activeId = id;
  const msg = messages.find(m=>m.id===id);
  if(!msg) return;
  document.getElementById('msgSubject').textContent = msg.subject||'(без темы)';
  document.getElementById('msgMeta').innerHTML = `От: ${esc(msg.from?.address||msg.from||'')}<br>Дата: ${formatTime(msg.createdAt,true)}`;
  document.getElementById('msgBody').innerHTML = '<div style="padding:20px;font-family:var(--mono);font-size:0.75rem;color:#606080"><span class="spinner"></span> загрузка...</div>';
  document.getElementById('inboxPanel').classList.add('split');
  document.getElementById('msgPanel').classList.add('open');
  renderMessages();

  try {
    const res = await fetch(`${API}/messages/${id}`,{headers:{'Authorization':`Bearer ${token}`}});
    const data = await res.json();
    const body = document.getElementById('msgBody');

    if(data.html && data.html.length) {
      const htmlContent = Array.isArray(data.html) ? data.html.join('') : data.html;
      const div = document.createElement('div');
      div.className = 'email-html-content';
      div.innerHTML = htmlContent;
      // Fix all links to be clickable and open externally
      div.querySelectorAll('a').forEach(a => {
        const href = a.getAttribute('href');
        if(href && !href.startsWith('mailto:')) {
          a.setAttribute('target','_blank');
          a.setAttribute('rel','noopener noreferrer');
        }
        a.style.pointerEvents = 'auto';
        a.style.cursor = 'pointer';
      });
      // Fix images
      div.querySelectorAll('img').forEach(img => {
        img.style.maxWidth = '100%';
        img.style.height = 'auto';
      });
      body.innerHTML = '';
      body.appendChild(div);
    } else if(data.text) {
      const linked = data.text.replace(/(https?:\/\/[^\s<>"']+)/g,'<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
      const div = document.createElement('div');
      div.className = 'email-text-content';
      div.innerHTML = linked;
      body.innerHTML = '';
      body.appendChild(div);
    } else {
      body.innerHTML = '<div style="font-family:var(--mono);font-size:0.8rem;color:#606080;padding:20px">(письмо пустое)</div>';
    }
    msg.seen = true;
    renderMessages();
  } catch(e) {
    document.getElementById('msgBody').innerHTML = '<div style="color:#ff6b6b;font-family:var(--mono);font-size:0.8rem;padding:20px">Ошибка загрузки</div>';
  }
}

function closeMessage() {
  activeId = null;
  document.getElementById('inboxPanel').classList.remove('split');
  document.getElementById('msgPanel').classList.remove('open');
  document.getElementById('msgBody').innerHTML = '';
}

function copyEmail() {
  if(!currentEmail) return;
  const el = document.getElementById('emailAddress');
  const ok = () => { el.classList.add('copied'); setTimeout(()=>el.classList.remove('copied'),1500); showToast('Адрес скопирован!'); };
  if(navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(currentEmail).then(ok).catch(fb);
  } else { fb(); }
  function fb() {
    const ta = document.createElement('textarea');
    ta.value = currentEmail;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); ok(); } catch(e){ showToast('Скопируй вручную: '+currentEmail,true); }
    document.body.removeChild(ta);
  }
}

function setStatus(active,text) {
  document.getElementById('statusDot').className='status-dot'+(active?' active':'');
  document.getElementById('statusText').textContent=text;
}

function showToast(msg,isError=false) {
  const c=document.getElementById('toasts');
  const t=document.createElement('div');
  t.className='toast'+(isError?' error':'');
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>t.remove(),4000);
}

function formatTime(str,full=false) {
  if(!str) return '';
  const d=new Date(str);
  if(full) return d.toLocaleString('ru-RU');
  const diff=Date.now()-d;
  if(diff<60000) return 'только что';
  if(diff<3600000) return Math.floor(diff/60000)+' мин назад';
  if(diff<86400000) return d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('ru-RU');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
